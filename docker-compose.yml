version: '3.8'

services:
  url-shortener:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_BASE_URL=http://localhost:8080
      - JAVA_OPTS=-Xmx256m -Xms128m
    container_name: url-shortener-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/metrics/total-urls"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - url-shortener-network

networks:
  url-shortener-network:
    driver: bridge

